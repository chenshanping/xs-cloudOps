server:
  port: 9000
  mode: debug  # debug, release, test
  host: localhost:9000
mysql:
  host: 127.0.0.1
  port: 3306
  username: root
  password: 123456
  dbname: go-base
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: "123456"
  db: 1

jwt:
  secret: go-base-jwt-secret-key
  expires: 7200          # token过期时间(秒) 2小时
  refresh_window: 604800 # 过期后允许刷新的时间窗口(秒) 7天
  issuer: web

casbin:
  model_path: ./rbac_model.conf

log:
  level: info
  format: console      # console(控制台人类可读), json(控制台也用JSON)
  directory: ./logs
  filename: app.log    # 日志文件名
  max_size: 100        # 单个日志文件最大大小(MB)
  max_backups: 5       # 保留旧日志文件数量
  max_age: 30          # 日志文件保留天数
  compress: true       # 是否压缩旧日志文件
  stdout: true         # 是否同时输出到控制台(容器部署建议开启)

